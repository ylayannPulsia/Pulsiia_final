<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulsiia — Nouveau mot de passe</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: linear-gradient(135deg, #F8FAFC 0%, #EEF2FF 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 24px; padding: 40px 32px; max-width: 440px; width: 100%; box-shadow: 0 32px 80px -16px rgba(91, 91, 247, 0.15); }
    .logo { display: block; width: 56px; height: 56px; margin-bottom: 20px; object-fit: contain; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    .subtitle { color: #6B7280; font-size: 15px; margin-bottom: 28px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
    .field { margin-bottom: 18px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #E5E7EB; border-radius: 12px; font: inherit; font-size: 15px; }
    input:focus { outline: none; border-color: #5B5BF7; box-shadow: 0 0 0 3px rgba(91,91,247,.12); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: #5B5BF7; color: #fff; font: inherit; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .msg { margin-top: 16px; padding: 12px 14px; border-radius: 12px; font-size: 13px; display: none; }
    .msg.ok { display: block; background: #ECFDF5; color: #065F46; }
    .msg.err { display: block; background: #FEF2F2; color: #B91C1C; }
    .back { display: block; margin-top: 20px; text-align: center; color: #5B5BF7; font-weight: 600; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/assets/logo.svg" width="56" height="56" alt="Pulsiia">
    <h1>Nouveau mot de passe</h1>
    <p class="subtitle">Choisissez un mot de passe d'au moins 8 caractères.</p>
    <form id="reset-form">
      <div class="field">
        <label for="password">Nouveau mot de passe</label>
        <input id="password" type="password" autocomplete="new-password" required minlength="8">
      </div>
      <div class="field">
        <label for="password2">Confirmer</label>
        <input id="password2" type="password" autocomplete="new-password" required minlength="8">
      </div>
      <button type="submit" class="btn" id="submit-btn">Enregistrer</button>
    </form>
    <div id="msg" class="msg"></div>
    <a class="back" href="/">← Retour à la connexion</a>
  </main>
  <script src="/config.defaults.js"></script>
  <script src="/config.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      const form = document.getElementById('reset-form');
      const msg = document.getElementById('msg');
      const btn = document.getElementById('submit-btn');
      const apiBase = (window.__PULSIIA_CONFIG__ && window.__PULSIIA_CONFIG__.apiUrl) || 'http://localhost:3001';

      if (!token) {
        msg.textContent = 'Lien invalide — demandez une nouvelle réinitialisation depuis la page de connexion.';
        msg.className = 'msg err';
        form.style.display = 'none';
        return;
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const p1 = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        if (p1 !== p2) {
          msg.textContent = 'Les mots de passe ne correspondent pas.';
          msg.className = 'msg err';
          return;
        }
        btn.disabled = true;
        btn.textContent = 'Enregistrement…';
        try {
          const res = await fetch(apiBase + '/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: token, newPassword: p1 }),
          });
          const data = await res.json().catch(function () { return {}; });
          if (!res.ok) throw new Error(data.error || 'Erreur');
          msg.textContent = data.message || 'Mot de passe mis à jour — redirection…';
          msg.className = 'msg ok';
          form.style.display = 'none';
          setTimeout(function () { location.href = '/'; }, 2000);
        } catch (err) {
          msg.textContent = err.message || 'Erreur';
          msg.className = 'msg err';
          btn.disabled = false;
          btn.textContent = 'Enregistrer';
        }
      });
    })();
  </script>
</body>
</html>
