name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pulsiia
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: pulsiia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        env:
          DATABASE_URL: postgresql://pulsiia:testpass@localhost:5432/pulsiia_test
        run: npx prisma generate

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://pulsiia:testpass@localhost:5432/pulsiia_test
        run: npx prisma migrate deploy

      - name: Generate JWT RS256 keys
        working-directory: backend
        run: npm run jwt:keys

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://pulsiia:testpass@localhost:5432/pulsiia_test
          JWT_PRIVATE_KEY_PATH: ./keys/jwt-private.pem
          JWT_PUBLIC_KEY_PATH: ./keys/jwt-public.pem
          JWT_REFRESH_PRIVATE_KEY_PATH: ./keys/jwt-refresh-private.pem
          JWT_REFRESH_PUBLIC_KEY_PATH: ./keys/jwt-refresh-public.pem
        run: npm test
