version: '3.9'

# ============================================================
#  Pulsiia — Docker Compose
#  MVP ~30 utilisateurs — PostgreSQL local sur VPS
# ============================================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: pulsiia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pulsiia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulsiia_dev_pass}
      POSTGRES_DB:       pulsiia
      # Tuning mémoire pour VPS DEV1-S (2GB RAM)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=fr_FR.UTF-8"
    ports:
      # Exposé uniquement en local — jamais sur internet (firewall UFW)
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=1GB
        -c max_connections=100
        -c work_mem=8MB
        -c maintenance_work_mem=128MB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=8MB
        -c log_min_duration_statement=500
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulsiia"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres_data:
    driver: local
