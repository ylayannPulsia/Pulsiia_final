name: CI — Pulsiia

on:
  push:
    branches: [main, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint + Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: pulsiia
          POSTGRES_PASSWORD: pulsiia_dev
          POSTGRES_DB: pulsiia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulsiia -d pulsiia_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate JWT keys (test)
        run: node scripts/generate-jwt-keys.js
        env:
          JWT_PRIVATE_KEY_PATH: ./keys/jwt-private.pem
          JWT_PUBLIC_KEY_PATH: ./keys/jwt-public.pem

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://pulsiia:pulsiia_dev@localhost:5432/pulsiia_test

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://pulsiia:pulsiia_dev@localhost:5432/pulsiia_test
          BCRYPT_SALT_ROUNDS: 4
          JWT_ACCESS_TTL: 15m
          JWT_REFRESH_TTL: 7d
          JWT_ISSUER: pulsiia
          JWT_AUDIENCE: pulsiia-app
          RESET_TOKEN_TTL_MINUTES: 30
          FRONTEND_URL: http://localhost:3000
          JWT_PRIVATE_KEY_PATH: ./keys/jwt-private.pem
          JWT_PUBLIC_KEY_PATH: ./keys/jwt-public.pem

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: backend/coverage/
          retention-days: 7
