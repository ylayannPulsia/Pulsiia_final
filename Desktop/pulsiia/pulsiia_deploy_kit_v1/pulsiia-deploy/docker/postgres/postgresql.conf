# ─────────────────────────────────────────────────────────────
# Postgres tuning — VPS 4GB RAM / 2 CPU
# ─────────────────────────────────────────────────────────────
# Calculé via pgtune-like heuristics pour OLTP web app
# https://pgtune.leopard.in.ua/
# ─────────────────────────────────────────────────────────────

# ─── Connexions ────────────────────────────────────────────
max_connections = 100
superuser_reserved_connections = 3

# ─── Mémoire ───────────────────────────────────────────────
# shared_buffers ~25% RAM disponible (1GB pour 4GB VPS)
shared_buffers = 1GB

# effective_cache_size ~75% (estimation OS file cache)
effective_cache_size = 3GB

# work_mem = (RAM - shared_buffers) / max_connections / 2
work_mem = 8MB

# maintenance_work_mem = 5% RAM
maintenance_work_mem = 256MB

# ─── WAL & checkpoint ──────────────────────────────────────
wal_buffers = 16MB
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# ─── Stats & query planner ─────────────────────────────────
default_statistics_target = 100
random_page_cost = 1.1            # pour SSD
effective_io_concurrency = 200    # SSD

# ─── Logging ───────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_truncate_on_rotation = on
log_min_duration_statement = 1000  # logge les requêtes > 1s
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# ─── Autovacuum (important pour pgvector) ──────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

# ─── SSL & sécurité ────────────────────────────────────────
ssl = off
# (TLS terminé au niveau Nginx, traffic interne docker network)

# ─── Listen ────────────────────────────────────────────────
listen_addresses = '*'  # OK car postgres ne sort pas du réseau docker
