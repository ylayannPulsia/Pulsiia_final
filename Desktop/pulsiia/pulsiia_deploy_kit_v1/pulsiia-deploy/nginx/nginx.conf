user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
  multi_accept on;
  use epoll;
}

http {
  # ─── Logging ────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  log_format json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for"'
  '}';

  access_log /var/log/nginx/access.log json;

  # ─── Performance ────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  keepalive_requests 100;
  types_hash_max_size 2048;
  server_tokens off;

  client_max_body_size 10M;
  client_body_timeout 12;
  client_header_timeout 12;
  send_timeout 10;

  # ─── Compression ────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/atom+xml image/svg+xml;

  # ─── MIME ───────────────────────────────────────────────
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ─── Rate limiting (en plus de celui d'Express) ─────────
  # 60 req/s par IP, burst 20
  limit_req_zone $binary_remote_addr zone=general:10m rate=60r/s;
  # Auth endpoints : plus strict (5/s, burst 10)
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
  # API Pulse : 30/s (correspond au rate limit Express)
  limit_req_zone $binary_remote_addr zone=pulse_api:10m rate=30r/s;

  limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

  # ─── SSL global ─────────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout 5s;

  # ─── Trusted proxies ────────────────────────────────────
  # Si tu mets un Cloudflare devant, ajouter leurs IPs ici
  # set_real_ip_from 173.245.48.0/20;
  # real_ip_header CF-Connecting-IP;

  include /etc/nginx/conf.d/*.conf;
}
