# ─────────────────────────────────────────────────────────────
# app.pulsiia.com — vhost principal
# ─────────────────────────────────────────────────────────────

# ─── HTTP → HTTPS redirect + ACME challenge ──────────────
server {
  listen 80;
  listen [::]:80;
  server_name app.pulsiia.com pulsiia.com www.pulsiia.com;

  # Let's Encrypt verification
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Healthcheck nginx (pour docker)
  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Tout le reste → HTTPS
  location / {
    return 301 https://$host$request_uri;
  }
}

# ─── HTTPS principal ─────────────────────────────────────
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name app.pulsiia.com;

  ssl_certificate     /etc/letsencrypt/live/app.pulsiia.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.pulsiia.com/privkey.pem;
  ssl_trusted_certificate /etc/letsencrypt/live/app.pulsiia.com/chain.pem;

  # ─── Security headers ──────────────────────────────────
  # HSTS : 1 an, includeSubDomains, preload-eligible
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # CSP — adapter selon ton frontend (this is restrictive baseline)
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.anthropic.com; frame-ancestors 'none';" always;

  # ─── Limites globales ──────────────────────────────────
  limit_conn conn_per_ip 30;
  limit_req zone=general burst=20 nodelay;

  client_max_body_size 10M;

  # ─── API Pulse (rate limit dédié) ──────────────────────
  location /api/pulse/ {
    limit_req zone=pulse_api burst=10 nodelay;

    # Streaming SSE compatibility (pour future v4)
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 600s;

    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── Auth endpoints (rate limit strict) ────────────────
  location ~ ^/api/auth/(login|register|password) {
    limit_req zone=auth burst=5 nodelay;

    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── OAuth callback Pulse MCP ──────────────────────────
  # (pas de rate limit ici, sinon le user peut être bloqué pendant l'OAuth)
  location ~ ^/api/pulse/mcp/callback/ {
    proxy_pass http://app:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── API générale ──────────────────────────────────────
  location /api/ {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 90s;
  }

  # ─── WebSocket (alertes proactives temps réel) ─────────
  location /socket.io/ {
    proxy_pass http://app:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_read_timeout 86400s;  # WebSocket long-lived
  }

  # ─── Static assets / SPA ──────────────────────────────
  location / {
    proxy_pass http://app:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ─── Healthcheck (sans log) ────────────────────────────
  location = /health {
    access_log off;
    proxy_pass http://app:3000/health;
  }

  # ─── Bloque accès aux fichiers sensibles ───────────────
  location ~ /\.(env|git|svn|htaccess|htpasswd) {
    deny all;
    return 404;
  }
}

# ─── Redirect pulsiia.com → app.pulsiia.com ──────────────
server {
  listen 443 ssl http2;
  server_name pulsiia.com www.pulsiia.com;

  ssl_certificate     /etc/letsencrypt/live/pulsiia.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/pulsiia.com/privkey.pem;

  return 301 https://app.pulsiia.com$request_uri;
}
